
user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { 
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    server {
        listen       8848;
        server_name  localhost;
        access_log /var/log/nginx/data-center-admin.access.log;
        error_log /var/log/nginx/data-center-admin.error.log;
        # 放开请求体大小限制（解决 413 Request Entity Too Large）
        client_max_body_size 200m;
        # 微前端子应用跨域支持 - 全局配置
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, HEAD" always;
        add_header Access-Control-Allow-Headers "DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,Frontend-Id,Module-Name" always;
        add_header Access-Control-Expose-Headers "*" always;
        add_header Access-Control-Allow-Credentials "true" always;
        # 前端页面目录
        root   /data/web/data-center-admin;
        index  index.html index.htm;

        # OPA API 转发到 80 端口
        location /opa/api {
            proxy_pass http://10.113.202.3;
        }
        
        # 认证接口
        location /saas {
            proxy_pass http://10.113.202.3;
        }


        location /bff-api {
            proxy_pass http://10.113.202.3;
        }
                # 处理 /data-center-admin 路径的请求
        location /data-center-admin {
            # 设置根目录为 /data/web/data-center-admin
            alias /data/web/data-center-admin;
            # 尝试直接访问文件，如果不存在则重定向到 index.html（支持单页应用路由）
            try_files $uri $uri/ /data-center-admin/index.html;
            
            # 处理静态资源的缓存
            location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
                expires 30d;
                add_header Cache-Control "public, max-age=2592000";
            }
        }
        # 单页应用路由
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 静态资源缓存
        location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
            
        }

    }

}
    
