            required: true # 强制用户输入（可选设为 false 并提供默认值）
            type: select
            default: saas-tenant-prod
            options:
              # - name:  uat环境
              #   value: saas-prod
              #   description: 稳定版部署
              - name: 租户版生产环境
                value: saas-tenant-prod
                description: 金丝雀版部署
          MANUAL_TAG:
            name: MANUAL_TAG # 参数名，需与构建脚本中的变量一致
            type: input # 输入类型为文本
            description: "请输入本次发布的tag标签（例如：v1.0.0-prd）"
            required: false # 强制用户输入（可选设为 false 并提供默认值）
            default: "v1.0.0-tenant-prd"
            placeholder: "v1.0.0-tenant-prd" # 输入框提示文字
          DEPLOY_MODE:
            # 单选下拉选择框
            name: DEPLOY_MODE
            description: 区分稳定版和金丝雀版部署
            required: true
            type: select
            default: stable
            options:
              - name: 稳定版部署
                value: stable
                description: 稳定版部署
              - name: 金丝雀版部署
                value: canary
                description: 金丝雀版部署
        permissions:
          roles:
            - master # 管理员
            - owner # 负责人
