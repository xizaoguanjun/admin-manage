branch:
  - reg: ^dev # 所有分支
    buttons:
      - name: 线上联调环境构建
        description: 手动触发线上联调环境构建
        event: web_trigger_test_build # 对应 .cnb.yml 的全局事件
        permissions:
          roles:
            - master # 管理员
            - owner # 负责人
            - developer # 开发者
  - reg: ^test # 所有分支
    buttons:
      - name: test-k8s构建
        description: 手动触发test-环境构建
        event: web_trigger_test_k8s_build # 对应 .cnb.yml 的全局事件
        type: mixed
        inputs:
          NAME_SPACE:
            name: NAME_SPACE # 参数名，需与构建脚本中的变量一致
            description: "部署环境"
            required: true # 强制用户输入（可选设为 false 并提供默认值）
            type: select
            default: saas-sit
            options:
              - name: test环境
                value: saas-sit
                description: 稳定版部署
          MANUAL_TAG:
            name: MANUAL_TAG # 参数名，需与构建脚本中的变量一致
            type: input # 输入类型为文本
            description: "请输入本次发布的tag标签（例如：v1.0.0-test）"
            required: false # 强制用户输入（可选设为 false 并提供默认值）
            default: "v1.0.0-test"
            placeholder: "v1.0.0-test" # 输入框提示文字
          DEPLOY_MODE:
            # 单选下拉选择框
            name: DEPLOY_MODE
            description: 选择部署模式
            required: true
            type: select
            default: stable
            options:
              - name: 稳定版部署
                value: stable
                description: 稳定版部署
              - name: 金丝雀版部署
                value: canary
                description: 金丝雀版部署
        permissions:
          roles:
            - master # 管理员
            - owner # 负责人
  - reg: ^uat # 所有分支
    buttons:
      - name: k8s构建
        description: 手动触发生产构建
        event: web_trigger_uat_k8s_build # 对应 .cnb.yml 的全局事件
        type: mixed
        inputs:
          NAME_SPACE:
            name: NAME_SPACE # 参数名，需与构建脚本中的变量一致
            description: "部署环境"
            required: true # 强制用户输入（可选设为 false 并提供默认值）
            type: select
            default: saas-prod
            options:
              - name: uat环境
                value: saas-prod
                description: 稳定版部署
              - name: 租户版生产环境
                value: saas-tenant-prod
                description: 金丝雀版部署
          MANUAL_TAG:
            name: MANUAL_TAG # 参数名，需与构建脚本中的变量一致
            type: input # 输入类型为文本
            description: "请输入本次发布的tag标签（例如：v1.0.0-prd）"
            required: false # 强制用户输入（可选设为 false 并提供默认值）
            default: "v1.0.0-prd"
            placeholder: "v1.0.0-prd" # 输入框提示文字
          DEPLOY_MODE:
            # 单选下拉选择框
            name: DEPLOY_MODE
            description: 选择部署模式
            required: true
            type: select
            default: stable
            options:
              - name: 稳定版部署
                value: stable
                description: 稳定版部署
              - name: 金丝雀版部署
                value: canary
                description: 金丝雀版部署
        permissions:
          roles:
            - master # 管理员
            - owner # 负责人
      - name: test-uat-k8s构建
        description: 手动触发test-uat环境构建
        event: web_trigger_test_uat_k8s_build # 对应 .cnb.yml 的全局事件
        type: mixed
        inputs:
          NAME_SPACE:
            name: NAME_SPACE # 参数名，需与构建脚本中的变量一致
            description: "部署环境"
            required: true # 强制用户输入（可选设为 false 并提供默认值）
            type: select
            default: saas-uat
            options:
              - name: uat环境
                value: saas-uat
                description: 稳定版部署
          MANUAL_TAG:
            name: MANUAL_TAG # 参数名，需与构建脚本中的变量一致
            type: input # 输入类型为文本
            description: "请输入本次发布的tag标签（例如：v1.0.0-uat）"
            required: false # 强制用户输入（可选设为 false 并提供默认值）
            default: "v1.0.0-uat"
            placeholder: "v1.0.0-uat" # 输入框提示文字
          DEPLOY_MODE:
            # 单选下拉选择框
            name: DEPLOY_MODE
            description: 选择部署模式
            required: true
            type: select
            default: stable
            options:
              - name: 稳定版部署
                value: stable
                description: 稳定版部署
              - name: 金丝雀版部署
                value: canary
                description: 金丝雀版部署
        permissions:
          roles:
            - master # 管理员
            - owner # 负责人
  - reg: ^main # 所有分支
    buttons:
      # - name: 生产构建
      #   description: 手动触发生产构建
      #   event: web_trigger_prod_build # 对应 .cnb.yml 的全局事件
      #   permissions:
      #     roles:
      #       - master # 管理员
      #       - owner # 负责人
      - name: k8s金碧生产构建
        description: 手动触发生产构建
        event: web_trigger_prod_k8s_build # 对应 .cnb.yml 的全局事件
        type: mixed
        inputs:
          NAME_SPACE:
            name: NAME_SPACE # 参数名，需与构建脚本中的变量一致
            description: "部署环境"
            required: true # 强制用户输入（可选设为 false 并提供默认值）
            type: select
            default: saas-prod
            options:
              - name: 金碧生产环境
                value: saas-prod
                description: 稳定版部署
          MANUAL_TAG:
            name: MANUAL_TAG # 参数名，需与构建脚本中的变量一致
            type: input # 输入类型为文本
            description: "请输入本次发布的tag标签（例如：v1.0.0-prd）"
            required: false # 强制用户输入（可选设为 false 并提供默认值）
            default: "v1.0.0-prd"
            placeholder: "v1.0.0-prd" # 输入框提示文字
          DEPLOY_MODE:
            # 单选下拉选择框
            name: DEPLOY_MODE
            description: 区分稳定版和金丝雀版部署
            required: true
            type: select
            default: stable
            options:
              - name: 稳定版部署
                value: stable
                description: 稳定版部署
              - name: 金丝雀版部署
                value: canary
                description: 金丝雀版部署
        permissions:
          roles:
            - master # 管理员
            - owner # 负责人
      - name: k8s租户生产构建
        description: 手动触发生产构建
        event: web_trigger_prod_k8s_build # 对应 .cnb.yml 的全局事件
        type: mixed
        inputs:
          NAME_SPACE:
            name: NAME_SPACE # 参数名，需与构建脚本中的变量一致
